<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KATALE</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #ffffff;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        /* The Masking Screen */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        /* The App Frame Container */
        #app-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            z-index: 1;
        }

        .katale-text {
            font-size: 70px;
            font-weight: 900;
            fill: #4CAF50;
            letter-spacing: 2px;
            filter: drop-shadow(0 2px 0 #388E3C) 
                    drop-shadow(0 4px 0 #2E7D32) 
                    drop-shadow(0 12px 10px rgba(0,0,0,0.15));
        }

        .hizstar-text {
            font-size: 14px;
            fill: #a5d6a7;
            letter-spacing: 10px;
            text-transform: lowercase;
        }

        #status-text {
            margin-top: 15px;
            font-family: 'Helvetica', sans-serif;
            color: #4CAF50;
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        #loading-dot { fill: #2E7D32; }
    </style>
</head>
<body>

    <!-- The Protective Cover Layout -->
    <div id="loader-container">
        <svg width="320" height="260" viewBox="0 0 600 500">
            <text x="50%" y="250" text-anchor="middle" class="katale-text">KATALE</text>
            <text x="50%" y="315" text-anchor="middle" class="hizstar-text">hizstar</text>
            <path id="infinityPath" d="M 135,180 C 250,-50 250,550 465,180" fill="none" stroke="transparent" />
            <circle id="loading-dot" r="14">
                <animateMotion dur="2.2s" repeatCount="indefinite" rotate="auto">
                    <mpath href="#infinityPath" />
                </animateMotion>
            </circle>
        </svg>
        <div id="status-text">CONNECTING 0%</div>
    </div>

    <!-- Embedded Application Screen -->
    <iframe id="app-frame" src=""></iframe>

<script>
    const BASE_URL = "https://My-businessi-app.onrender.com";
    const SIGNAL_URL = BASE_URL + "/api/heartbeat";
    
    const loader = document.getElementById('loader-container');
    const frame = document.getElementById('app-frame');
    const statusText = document.getElementById('status-text');

    let progress = 0;
    let fakeLoader;
    let appLoaded = false;
    let pollInterval; // Store the interval ID

    function runPercentage(targetSpeed, maxPercent) {
        clearInterval(fakeLoader);
        fakeLoader = setInterval(() => {
            if (progress < maxPercent) {
                progress++;
                statusText.innerText = `Preparing... ${progress}%`;
            }
        }, targetSpeed);
    }

    runPercentage(15, 50);
    setTimeout(() => { runPercentage(400, 95); }, 800);

    async function listenToSignal() {
        try {
            const response = await fetch(SIGNAL_URL + "?t=" + new Date().getTime());
            const data = await response.json();

            if (data && data.signature === "HIZSTAR_ENGINE_FRESH_START") {
                if (!appLoaded) {
                    appLoaded = true;
                    clearInterval(fakeLoader);
                    statusText.innerText = "Work space open 100%";
                    
                    frame.src = BASE_URL + (window.location.search || "/");

                    frame.onload = function() {
                        frame.style.display = "block";
                        loader.style.opacity = '0';
                        setTimeout(() => { loader.style.display = 'none'; }, 400);
                    };
                }
                // IMPORTANT: Do not set another timeout here. 
                // We stop polling once the app is loaded.
            } else {
                throw new Error("Invalid Engine Signature");
            }
        } catch (err) {
            console.log("Signal lost, retrying...");
            if (!appLoaded) {
                // Only reset the loader if we haven't successfully loaded the app yet
                progress = 95;
                statusText.innerText = "Connecting... 95%";
                setTimeout(listenToSignal, 4500);
            }
        }
    }

    listenToSignal();
</script>
</body>
</html>
