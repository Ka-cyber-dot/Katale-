<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KATALE | Hizstar</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffffff; /* Clean white background */
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        .logo-container {
            text-align: center;
            position: relative;
        }

        /* Refined 3D Green Style - No black angles */
        .katale-text {
            font-size: 100px;
            font-weight: 900;
            fill: #4CAF50; /* Vibrant primary green */
            letter-spacing: 2px;
            /* Using multiple soft green shadows to create a 3D "bezel" look */
            filter: drop-shadow(0 2px 0 #388E3C) 
                    drop-shadow(0 4px 0 #2E7D32) 
                    drop-shadow(0 6px 0 #1B5E20) 
                    drop-shadow(0 15px 15px rgba(0,0,0,0.15));
        }

        /* Styled hizstar text */
        .hizstar-text {
            font-size: 18px;
            fill: #a5d6a7; /* Light sage green for contrast */
            letter-spacing: 18px;
            text-transform: lowercase;
            font-weight: normal;
        }

        /* The Dot - Matching the 3D green theme */
        #loading-dot {
            fill: #2E7D32;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        .status {
            margin-top: 20px;
            font-family: 'Helvetica', sans-serif;
            color: #81C784;
            font-size: 12px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <svg width="600" height="500" viewBox="0 0 600 500">
            <!-- Main Title -->
            <text x="50%" y="250" text-anchor="middle" class="katale-text">KATALE</text>
            
            <!-- hizstar below -->
            <text x="50%" y="315" text-anchor="middle" class="hizstar-text">hizstar</text>

            <!-- The "Broken 8" Path preserved from previous version -->
            <path id="infinityPath" d="M 135,180 C 250,-150 250,650 465,180" fill="none" />

            <!-- Animated Dot -->
            <circle id="loading-dot" r="14">
                <animateMotion dur="3s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 1" keySplines="0.4, 0, 0.6, 1">
                    <mpath href="#infinityPath" />
                </animateMotion>
            </circle>
        </svg>

        <div class="status" id="status-text">Connecting...</div>
    </div>

    <script>
        const APP_URL = "https://hizstar.onrender.com"; 

        async function checkServer() {
            try {
                await fetch(APP_URL, { mode: 'no-cors' });
                document.getElementById('status-text').innerText = "SYSTEMS LIVE";
                setTimeout(() => { window.location.href = APP_URL; }, 1000);
            } catch (error) {
                setTimeout(checkServer, 3000);
            }
        }
        checkServer();
    </script>
</body>
</html>
