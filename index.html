<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KATALE | Hizstar</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffffff;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        .logo-container {
            text-align: center;
            position: relative;
        }

        .katale-text {
            font-size: 100px;
            font-weight: 900;
            fill: #4CAF50;
            letter-spacing: 2px;
            filter: drop-shadow(0 2px 0 #388E3C) 
                    drop-shadow(0 4px 0 #2E7D32) 
                    drop-shadow(0 6px 0 #1B5E20) 
                    drop-shadow(0 15px 15px rgba(0,0,0,0.15));
        }

        .hizstar-text {
            font-size: 18px;
            fill: #a5d6a7;
            letter-spacing: 18px;
            text-transform: lowercase;
            font-weight: normal;
        }

        #loading-dot {
            fill: #2E7D32;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        .status {
            margin-top: 20px;
            font-family: 'Helvetica', sans-serif;
            color: #81C784;
            font-size: 14px;
            letter-spacing: 5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <svg width="600" height="500" viewBox="0 0 600 500">
            <text x="50%" y="250" text-anchor="middle" class="katale-text">KATALE</text>
            <text x="50%" y="315" text-anchor="middle" class="hizstar-text">hizstar</text>
            <path id="infinityPath" d="M 135,180 C 250,-150 250,650 465,180" fill="none" />
            <circle id="loading-dot" r="14">
                <animateMotion dur="3s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 1" keySplines="0.4, 0, 0.6, 1">
                    <mpath href="#infinityPath" />
                </animateMotion>
            </circle>
            <svg width="600" height="500" viewBox="0 0 600 500">
    <!-- Branding Texts -->
    <text x="50%" y="250" text-anchor="middle" class="katale-text">KATALE</text>
    <text x="50%" y="315" text-anchor="middle" class="hizstar-text">hizstar</text>

    <!-- Corrected "Broken 8" Path (Falling and Rising Curve) -->
    <path id="infinityPath" 
          d="M 135,180 C 250,-50 250,550 465,180" 
          fill="none" 
          stroke="transparent" />

    <!-- The Animated Dot -->
    <circle id="loading-dot" r="14">
        <!-- This makes the dot actually follow the path -->
        <animateMotion dur="3s" repeatCount="indefinite" rotate="auto">
            <mpath href="#infinityPath" />
        </animateMotion>
    </circle>
</svg>
        </svg>

        <div class="status" id="status-text">INITIALIZING 0%</div>
    </div>

    <script>
        const APP_URL = "https://hizstar.onrender.com"; 
        const statusEl = document.getElementById('status-text');
        let progress = 0;

        function updateProgress(target) {
            const interval = setInterval(() => {
                if (progress < target) {
                    progress++;
                    statusEl.innerText = `LOADING ${progress}%`;
                } else {
                    clearInterval(interval);
                }
            }, 30);
        }

        async function checkServer() {
            updateProgress(50);

            // Start a very slow crawl toward 95% to keep the user engaged
            const fakeLoader = setInterval(() => {
                if (progress < 95) {
                    progress++;
                    statusEl.innerText = `WAITING ${progress}%`;
                }
            }, 1500);

            while (true) {
                try {
                    // Try to reach the engine
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 5000);

                    // We use 'no-cors' to avoid browser security blocks during the check
                    await fetch(APP_URL, { mode: 'no-cors', signal: controller.signal });
                    
                    // SUCCESS: The engine is awake
                    clearInterval(fakeLoader);
                    updateProgress(100);
                    statusEl.style.color = "#4CAF50";
                    statusEl.innerText = "ENGINE READY 100%";

                    // Automatic launch
                    setTimeout(() => {
                        window.location.replace(APP_URL); 
                    }, 800);
                    break;

                } catch (error) {
                    // Fail: Engine is still sleeping or suspended
                    // Wait 3 seconds and try again automatically
                    await new Promise(resolve => setTimeout(resolve, 3000));
                }
            }
        }

        checkServer();
    </script>
</body>
</html>
