
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KATALE</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #ffffff;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        /* The Masking Screen */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        /* The App Frame Container */
        #app-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            z-index: 1;
        }

        .katale-text {
            font-size: 70px;
            font-weight: 900;
            fill: #4CAF50;
            letter-spacing: 2px;
            filter: drop-shadow(0 2px 0 #388E3C) 
                    drop-shadow(0 4px 0 #2E7D32) 
                    drop-shadow(0 12px 10px rgba(0,0,0,0.15));
        }

        .hizstar-text {
            font-size: 14px;
            fill: #a5d6a7;
            letter-spacing: 10px;
            text-transform: lowercase;
        }

        #status-text {
            margin-top: 15px;
            font-family: 'Helvetica', sans-serif;
            color: #4CAF50;
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        #loading-dot { fill: #2E7D32; }
    </style>
</head>
<body>

    <!-- The Protective Cover Layout -->
    <div id="loader-container">
        <svg width="320" height="260" viewBox="0 0 600 500">
            <text x="50%" y="250" text-anchor="middle" class="katale-text">KATALE</text>
            <text x="50%" y="315" text-anchor="middle" class="hizstar-text">hizstar</text>
            <path id="infinityPath" d="M 135,180 C 250,-50 250,550 465,180" fill="none" stroke="transparent" />
            <circle id="loading-dot" r="14">
                <animateMotion dur="2.2s" repeatCount="indefinite" rotate="auto">
                    <mpath href="#infinityPath" />
                </animateMotion>
            </circle>
        </svg>
        <div id="status-text">CONNECTING 0%</div>
    </div>

    <!-- Embedded Application Screen -->
    <iframe id="app-frame" 
     
       src=""></iframe>

    <script>
        const BASE_URL = "https://My-businessi-app.onrender.com";
        const SIGNAL_URL = BASE_URL + "/api/heartbeat";
        
        const loader = document.getElementById('loader-container');
        const frame = document.getElementById('app-frame');
        const statusText = document.getElementById('status-text');

        let progress = 0;
        let fakeLoader;
        let appLoaded = false;

        function runPercentage(targetSpeed, maxPercent) {
            clearInterval(fakeLoader);
            fakeLoader = setInterval(() => {
                if (progress < maxPercent) {
                    progress++;
                    statusText.innerText = `prepairing ${progress}%`;
                }
            }, targetSpeed);
        }

        // Initialize display loaders
        runPercentage(15, 50);
        setTimeout(() => { runPercentage(400, 95); }, 800);

        async function listenToSignal() {
            try {
                // Fetch the small JSON payload from your route
                const response = await fetch(SIGNAL_URL + "?t=" + new Date().getTime());
                const data = await response.json();

                // STAGE 3 VALIDATION: Is the signature exactly yours?
                if (data && data.signature === "HIZSTAR_ENGINE_FRESH_START") {
                    
                    // If it is the first time finding the signal, launch the frame!
                    if (!appLoaded) {
                        appLoaded = true;
                        clearInterval(fakeLoader);
                        statusText.innerText = "work space open 100%";
                        
                        const currentQuery = window.location.search;
                        frame.src = BASE_URL + (currentQuery || "/");

                        frame.onload = function() {
                            setTimeout(() => {
                                frame.style.display = "block";
                                loader.style.opacity = '0';
                                setTimeout(() => { loader.style.display = 'none'; }, 400);
                            }, 300);
                        };
                    }
                } else {
                    // Wrong signature (Render served an error page instead of your app data)
                    throw new Error("Invalid Engine Signature");
                }

            } catch (err) {
                // SIGNAL LOST: Either suspended, sleeping, or crashed!
                console.log("Signal Dropped. Safe Mode Engaged.");
                
                // Instantly force back the green masking sheet!
                appLoaded = false;
                frame.style.display = "none";
                loader.style.display = "flex";
                loader.style.opacity = "1";
                
                // Keep the percentage showing a constant retry sync status
                progress = 95;
                statusText.innerText = " almost ready 95%";
            }

            // Loop forever: Check the live signature signal pulse every 4.5 seconds
            setTimeout(listenToSignal, 4500);
        }

        // Initialize Engine Monitoring System
        listenToSignal();
        
        async function checkIncomingNotifications() {
    const savedUserStr = localStorage.getItem('currentUser');
    if (!savedUserStr) return; 
    const currentUser = JSON.parse(savedUserStr);
    const myId = currentUser._id || currentUser.id;

    try {
        const response = await fetch(`https://my-businessi-app.onrender.com/api/messages/${myId}`);
        if (!response.ok) return;

        const messages = await response.json();

        if (Array.isArray(messages) && messages.length > 0) {
            messages.forEach(m => {
                const msgUniqueId = m._id || m.id;
                if (!knownMessageIds.includes(msgUniqueId)) {
                    knownMessageIds.push(msgUniqueId);
                    if (!isFirstLoad) {
                        triggerSystemBannerNotification(m.senderName, m.text);
                    }
                }
            });
            isFirstLoad = false;
        } else {
            isFirstLoad = false;
        }
    } catch (e) { 
        console.error("Background notification sync error:", e); 
    }
}

// --- SYSTEM DRAWER NOTIFICATION DISPATCHER ---
// --- PUBLIC VIEW MESSAGES LOADER (FIXED & DUPLICATE REMOVED) ---
// --- PUBLIC VIEW MESSAGES LOADER (WITH BOTH CUSTOM CARDS & ANDROID NOTIFICATIONS) ---
function triggerSystemBannerNotification(senderName, messageText) {
    // 1. Handle the dynamic In-App sliding Android Banner UI
    const banner = document.getElementById('android-push-banner');
    const titleEl = document.getElementById('banner-title');
    const textEl = document.getElementById('banner-text');

    if (banner && titleEl && textEl) {
        titleEl.innerText = `Message from ${senderName}`;
        textEl.innerText = messageText;
        banner.classList.add('show');
        setTimeout(() => { banner.classList.remove('show'); }, 4500);
    }

    // 2. Trigger the true Android Status Bar Notification via Service Worker
    if ('serviceWorker' in navigator && Notification.permission === "granted") {
        navigator.serviceWorker.ready.then(function(registration) {
            // Get the current user's profile data to find their Cloudinary avatar
            const savedUserStr = localStorage.getItem('currentUser');
            let avatarUrl = '/profile/default-avatar.png'; // fallback
            
            if (savedUserStr) {
                const savedUser = JSON.parse(savedUserStr);
                // Pull the live Cloudinary secure URL from the session state
                if (savedUser.user_profile?.avatar) {
                    avatarUrl = savedUser.user_profile.avatar;
                }
            }

            // Push the data payload directly into the background worker channel
            registration.showNotification(`Message from ${senderName}`, {
                body: messageText,
                icon: avatarUrl,  // Uses Cloudinary HTTPS string
                badge: avatarUrl, // Uses Cloudinary HTTPS string
                vibrate: [200, 100, 200]
            });
        });
    }

    const audio = document.getElementById('notif-sound');
    if (audio) audio.play().catch(() => {});
}

function setup() {
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
    
    // REGISTER THE NEWLY NAMED SERVICE WORKER FOR NATIVE ANDROID TRAYS
    if ('serviceWorker' in navigator && 'PushManager' in window) {
        navigator.serviceWorker.register('/hizstar-sw.js')
        .then(function(swReg) {
            console.log('Android Push Service Worker Registered successfully:', swReg);
            
            if (Notification.permission !== "granted") {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        console.log("Status Bar Alert Permissions Allowed.");
                    }
                });
            }
        })
        .catch(function(error) {
            console.error('Service Worker Registration Error:', error);
        });
    }

    loadInbox();
    setInterval(loadInbox, 4000);
    fixNavigationLinks();
}

async function setupNotifications() {
    // Check if the Capacitor object exists globally
    if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.PushNotifications) {
        const { PushNotifications } = window.Capacitor.Plugins;

        // Request permission
        let permStatus = await PushNotifications.requestPermissions();
        if (permStatus.receive === 'granted') {
            await PushNotifications.register();
        }

        // Listen for registration success
        PushNotifications.addListener('registration', (token) => {
            console.log('Push registration token: ', token.value);
        });

        // Listen for incoming notifications
        PushNotifications.addListener('pushNotificationReceived', (notification) => {
            console.log('Push received: ', notification);
        });
    } else {
        console.log("Capacitor Push Notifications not available in this environment.");
    }
}
// Inside your iframe page script
window.parent.postMessage('trigger_ad_notification', '*');
    </script>
</body>
</html>
