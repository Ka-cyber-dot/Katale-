<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KATALE | Hizstar</title>
    <style>
        /* Keep your existing styles exactly as they are */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffffff;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        /* The Engine (Hidden until 100%) */
        #app-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none; /* Hidden initially */
            z-index: 10;
        }

        .logo-container {
            text-align: center;
            position: relative;
            z-index: 5;
        }

        .katale-text {
            font-size: 100px;
            font-weight: 900;
            fill: #4CAF50;
            letter-spacing: 2px;
            filter: drop-shadow(0 2px 0 #388E3C) 
                    drop-shadow(0 4px 0 #2E7D32) 
                    drop-shadow(0 6px 0 #1B5E20) 
                    drop-shadow(0 15px 15px rgba(0,0,0,0.15));
        }

        .hizstar-text {
            font-size: 18px;
            fill: #a5d6a7;
            letter-spacing: 18px;
            text-transform: lowercase;
            font-weight: normal;
        }

        #loading-dot {
            fill: #2E7D32;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        .status {
            margin-top: 20px;
            font-family: 'Helvetica', sans-serif;
            color: #81C784;
            font-size: 14px;
            letter-spacing: 5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <!-- The "Engine" inside the "Car" -->
    <iframe id="app-frame" src="https://hizstar.onrender.com"></iframe>

    <div class="logo-container" id="loader-ui">
        <svg width="600" height="500" viewBox="0 0 600 500">
            <text x="50%" y="250" text-anchor="middle" class="katale-text">KATALE</text>
            <text x="50%" y="315" text-anchor="middle" class="hizstar-text">hizstar</text>
            <path id="infinityPath" d="M 135,180 C 250,-150 250,650 465,180" fill="none" />
            <circle id="loading-dot" r="14">
                <animateMotion dur="3s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 1" keySplines="0.4, 0, 0.6, 1">
                    <mpath href="#infinityPath" />
                </animateMotion>
            </circle>
        </svg>
        <div class="status" id="status-text">INITIALIZING 0%</div>
    </div>

    <script>
        const APP_URL = "https://hizstar.onrender.com"; 
        const statusEl = document.getElementById('status-text');
        const appFrame = document.getElementById('app-frame');
        const loaderUi = document.getElementById('loader-ui');
        let progress = 0;
        let checkInterval;

        function updateProgress(target) {
            const interval = setInterval(() => {
                if (progress < target) {
                    progress++;
                    statusEl.innerText = `LOADING ${progress}%`;
                } else {
                    clearInterval(interval);
                }
            }, 30);
        }

        async function checkServer() {
            updateProgress(50);
            
            // Slow creep toward 95%
            const fakeLoader = setInterval(() => {
                if (progress < 95) {
                    progress++;
                    statusEl.innerText = `WAITING ${progress}%`;
                }
            }, 1000);

            while (true) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 5000);

                    // PING the server
                    const response = await fetch(APP_URL, { mode: 'no-cors', signal: controller.signal });
                    
                    // SUCCESS: Server is awake!
                    clearInterval(fakeLoader);
                    updateProgress(100);
                    
                    setTimeout(() => {
                        loaderUi.style.display = 'none';
                        appFrame.style.display = 'block';
                        // Start background heartbeat to detect if it sleeps LATER
                        startHeartbeat();
                    }, 1000);
                    break; 

                } catch (error) {
                    // Fail: Wait and try again
                    await new Promise(res => setTimeout(res, 3000));
                }
            }
        }

        // The "Automatic" part: Watch the connection even while the app is open
        function startHeartbeat() {
            if (checkInterval) clearInterval(checkInterval);
            
            checkInterval = setInterval(async () => {
                try {
                    await fetch(APP_URL, { mode: 'no-cors' });
                } catch (e) {
                    // IF RENDER GOES TO SLEEP OR DEPLOYS:
                    console.log("wait we are working on your attempt...");
                    appFrame.style.display = 'none';
                    loaderUi.style.display = 'flex';
                    progress = 50; 
                    checkServer(); // Restart the wake-up loop
                }
            }, 20000); // Check every 20 seconds
        }

        checkServer();
    </script>
</body>
</html>
