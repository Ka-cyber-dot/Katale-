<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KATALE | Hizstar</title>
    <style>
        /* [KEEP YOUR EXISTING CSS HERE - The Green 3D Styles] */
        body, html { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: #fff; }
        
        #app-frame {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            z-index: 1; /* Under the loader */
            display: none;
        }

        #loader-ui {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999; /* Always on top during failure */
        }
    </style>
</head>
<body>

    <div id="loader-ui">
        <svg width="400" height="300" viewBox="0 0 600 500">
            <!-- Your KATALE SVG and "Broken 8" path here -->
        </svg>
        <div class="status" id="status-text">INITIALIZING 0%</div>
    </div>

    <!-- We use a wrapper to force the frame to reload -->
    <div id="frame-wrapper" style="width:100%; height:100%;"></div>

    <script>
        const APP_URL = "https://hizstar.onrender.com"; 
        const statusEl = document.getElementById('status-text');
        const loaderUi = document.getElementById('loader-ui');
        const wrapper = document.getElementById('frame-wrapper');
        let progress = 0;

        function updateProgress(target) {
            const interval = setInterval(() => {
                if (progress < target) {
                    progress++;
                    statusEl.innerText = `LOADING ${progress}%`;
                } else { clearInterval(interval); }
            }, 20);
        }

        async function checkEngine() {
            // Reset UI for a fresh wake-up
            loaderUi.style.display = 'flex';
            wrapper.innerHTML = ''; // Kill the old frame immediately
            progress = 0;
            updateProgress(50);

            let engineReady = false;
            while (!engineReady) {
                try {
                    // We use 'cache: no-store' to force a real check
                    const res = await fetch(APP_URL, { mode: 'no-cors', cache: 'no-store' });
                    
                    // If we reach this, the network request didn't throw an error
                    engineReady = true;
                    updateProgress(100);
                    
                    setTimeout(() => {
                        // Create the frame ONLY when we are sure
                        wrapper.innerHTML = `<iframe id="app-frame" src="${APP_URL}" style="width:100%; height:100%; border:none;"></iframe>`;
                        loaderUi.style.display = 'none';
                        startHeartbeat();
                    }, 1000);

                } catch (e) {
                    // Engine is dead/suspended - Wait 4 seconds and retry
                    statusEl.innerText = "WAITING FOR ENGINE...";
                    await new Promise(r => setTimeout(r, 4000));
                }
            }
        }

        function startHeartbeat() {
            // Check every 10 seconds. If Render sleeps, we cover the screen.
            const hb = setInterval(async () => {
                try {
                    const check = await fetch(APP_URL, { mode: 'no-cors', cache: 'no-store' });
                } catch (e) {
                    clearInterval(hb);
                    checkEngine(); // Trigger the loader and restart check
                }
            }, 10000);
        }

        checkEngine();
    </script>
</body>
</html>
