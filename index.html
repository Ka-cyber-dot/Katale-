<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KATALE | Hizstar</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background-color: #ffffff;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Loader Container */
        #loader-ui {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        /* The Embed Iframe (Hidden by default) */
        #content-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            z-index: 20;
        }

        .katale-text {
            font-size: 80px;
            font-weight: 900;
            fill: #4CAF50;
            letter-spacing: 2px;
            filter: drop-shadow(0 2px 0 #388E3C) 
                    drop-shadow(0 4px 0 #2E7D32) 
                    drop-shadow(0 15px 15px rgba(0,0,0,0.15));
        }

        .hizstar-text {
            font-size: 16px;
            fill: #a5d6a7;
            letter-spacing: 12px;
            text-transform: lowercase;
        }

        #status-text {
            margin-top: 20px;
            font-family: 'Helvetica', sans-serif;
            color: #81C784;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        #loading-dot { fill: #2E7D32; }
    </style>
</head>
<body>

    <!-- This is what shows while waiting -->
    <div id="loader-ui">
        <svg width="400" height="300" viewBox="0 0 600 500">
            <text x="50%" y="250" text-anchor="middle" class="katale-text">KATALE</text>
            <text x="50%" y="315" text-anchor="middle" class="hizstar-text">hizstar</text>
            <path id="infinityPath" d="M 135,180 C 250,-50 250,550 465,180" fill="none" stroke="transparent" />
            <circle id="loading-dot" r="14">
                <animateMotion dur="2.5s" repeatCount="indefinite" rotate="auto">
                    <mpath href="#infinityPath" />
                </animateMotion>
            </circle>
        </svg>
        <div id="status-text">INITIALIZING...</div>
    </div>

    <!-- This is the "Server" View -->
    <iframe id="content-frame" src=""></iframe>

    <script>
        const BASE_URL = "https://hizstar.onrender.com";
        const statusEl = document.getElementById('status-text');
        const frame = document.getElementById('content-frame');
        const loaderUI = document.getElementById('loader-ui');
        
        let progress = 0;

        // 1. Determine the final URL (handles the /=something logic)
        const currentQuery = window.location.search; 
        const targetUrl = BASE_URL + (currentQuery || "/");

        function updateProgress(target) {
            const interval = setInterval(() => {
                if (progress < target) {
                    progress++;
                    statusEl.innerText = `LOADING ${progress}%`;
                } else {
                    clearInterval(interval);
                }
            }, 20);
        }

        async function checkServer() {
            updateProgress(40);

            const fakeLoader = setInterval(() => {
                if (progress < 98) {
                    progress++;
                    statusEl.innerText = `CONNECTING ${progress}%`;
                }
            }, 800);

            while (true) {
                try {
                    const response = await fetch(BASE_URL, { mode: 'no-cors' });
                    
                    // SUCCESS: Server is awake!
                    clearInterval(fakeLoader);
                    statusEl.innerText = "ENGINE READY 100%";
                    statusEl.style.color = "#4CAF50";

                    // Load the content into the iframe
                    frame.src = targetUrl;

                    // When the iframe finishes loading, hide the loader and show content
                    frame.onload = () => {
                        loaderUI.style.opacity = "0";
                        setTimeout(() => {
                            loaderUI.style.display = "none";
                            frame.style.display = "block";
                        }, 500);
                    };
                    break;

                } catch (error) {
                    // Fail: Render is still "spinning up" the instance
                    await new Promise(resolve => setTimeout(resolve, 3000));
                }
            }
        }

        checkServer();
    </script>
</body>
    </html>
