<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KATALE | Hizstar</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffffff;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        .logo-container {
            text-align: center;
            position: relative;
        }

        .katale-text {
            font-size: 100px;
            font-weight: 900;
            fill: #4CAF50;
            letter-spacing: 2px;
            filter: drop-shadow(0 2px 0 #388E3C) 
                    drop-shadow(0 4px 0 #2E7D32) 
                    drop-shadow(0 6px 0 #1B5E20) 
                    drop-shadow(0 15px 15px rgba(0,0,0,0.15));
        }

        .hizstar-text {
            font-size: 18px;
            fill: #a5d6a7;
            letter-spacing: 18px;
            text-transform: lowercase;
            font-weight: normal;
        }

        #loading-dot {
            fill: #2E7D32;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        .status {
            margin-top: 20px;
            font-family: 'Helvetica', sans-serif;
            color: #81C784;
            font-size: 14px; /* Slightly larger for readability */
            letter-spacing: 5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <svg width="600" height="500" viewBox="0 0 600 500">
            <text x="50%" y="250" text-anchor="middle" class="katale-text">KATALE</text>
            <text x="50%" y="315" text-anchor="middle" class="hizstar-text">hizstar</text>
            <path id="infinityPath" d="M 135,180 C 250,-150 250,650 465,180" fill="none" />
            <circle id="loading-dot" r="14">
                <animateMotion dur="3s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 1" keySplines="0.4, 0, 0.6, 1">
                    <mpath href="#infinityPath" />
                </animateMotion>
            </circle>
        </svg>

        <div class="status" id="status-text">INITIALIZING 0%</div>
    </div>

    <script>
        const APP_URL = "https://hizstar.onrender.com"; 
        const statusEl = document.getElementById('status-text');
        let progress = 0;

        // Function to smoothly update the percentage text
        function updateProgress(target) {
            const interval = setInterval(() => {
                if (progress < target) {
                    progress++;
                    statusEl.innerText = `LOADING ${progress}%`;
                } else {
                    clearInterval(interval);
                }
            }, 30); // Speed of the text tick
        }

        async function checkServer() {
            // Step 1: Immediately jump to 50% to show activity
            updateProgress(50);

            let serverIsUp = false;
            
            // Step 2: Start a slow crawl toward 95% while waiting for Fetch
            const fakeLoader = setInterval(() => {
                if (progress < 95) {
                    progress++;
                    statusEl.innerText = `LOADING WAIT${progress}%...`;
                }
            }, 800); // Very slow creep to keep the user waiting without panic

            while (!serverIsUp) {
                try {
                    // We use a small timeout so the fetch doesn't hang forever
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 5000);

                    await fetch(APP_URL, { mode: 'no-cors', signal: controller.signal });
                    
                    // If fetch succeeds:
                    serverIsUp = true;
                    clearInterval(fakeLoader);
                    
                    // Step 3: Finish the progress and redirect
                    updateProgress(100);
                    statusEl.style.color = "#4CAF50";
                    statusEl.style.fontWeight = "bold";
                    statusEl.innerText=" 100%";
                    
                    setTimeout(() => { 
                        window.location.href = APP_URL; 
                    }, 800);

                } catch (error) {
                    // Server still sleeping (Render cold start)
                    // Wait 2 seconds before trying again
                    await new Promise(resolve => setTimeout(resolve, 2000));
                }
            }
        }

        // Start the process
        checkServer();
    </script>
</body>
</html>
