<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KATALE</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #ffffff;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        /* The Masking Screen */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        /* The App Frame Container */
        #app-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            z-index: 1;
        }

        .katale-text {
            font-size: 70px;
            font-weight: 900;
            fill: #4CAF50;
            letter-spacing: 2px;
            filter: drop-shadow(0 2px 0 #388E3C) 
                    drop-shadow(0 4px 0 #2E7D32) 
                    drop-shadow(0 12px 10px rgba(0,0,0,0.15));
        }

        .hizstar-text {
            font-size: 14px;
            fill: #a5d6a7;
            letter-spacing: 10px;
            text-transform: lowercase;
        }

        #status-text {
            margin-top: 15px;
            font-family: 'Helvetica', sans-serif;
            color: #4CAF50;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            padding: 0 20px;
        }

        #loading-dot { fill: #2E7D32; }
    </style>
</head>
<body>

    <!-- The Protective Cover Layout -->
    <div id="loader-container">
        <svg width="320" height="260" viewBox="0 0 600 500">
            <text x="50%" y="250" text-anchor="middle" class="katale-text">KATALE</text>
            <text x="50%" y="315" text-anchor="middle" class="hizstar-text">hizstar</text>
            <path id="infinityPath" d="M 135,180 C 250,-50 250,550 465,180" fill="none" stroke="transparent" />
            <circle id="loading-dot" r="14">
                <animateMotion dur="2.2s" repeatCount="indefinite" rotate="auto">
                    <mpath href="#infinityPath" />
                </animateMotion>
            </circle>
        </svg>
        <div id="status-text">CONNECTING 0%</div>
    </div>

    <!-- Embedded Application Screen -->
    <iframe id="app-frame" src=""></iframe>

    <script>
        const BASE_URL = "https://my-businessi-app.onrender.com";
        const SIGNAL_URL = BASE_URL + "/api/heartbeat";
        
        const loader = document.getElementById('loader-container');
        const frame = document.getElementById('app-frame');
        const statusText = document.getElementById('status-text');

        let progress = 0;
        let fakeLoader;
        let appLoaded = false;

        // Extract the exact path and parameters shared from WhatsApp (e.g., /user/664b3...)
        const sharedPath = window.location.pathname; 
        const sharedQuery = window.location.search;  

        function runPercentage(targetSpeed, maxPercent, messagePrefix) {
            clearInterval(fakeLoader);
            fakeLoader = setInterval(() => {
                if (progress < maxPercent) {
                    progress++;
                    statusText.innerText = `${messagePrefix || "prepairing make sure your internet is stable"} ${progress}%`;
                }
            }, targetSpeed);
        }

        // Initialize early visual percentage behaviors
        runPercentage(15, 50);
        setTimeout(() => { runPercentage(400, 90); }, 800);

        async function listenToSignal() {
            try {
                // If it takes longer than 90% and hasn't loaded yet, Render is waking up!
                if (!appLoaded && progress >= 90) {
                    runPercentage(1200, 98, "waking up digital storefront (please wait)...");
                }

                // Fetch the small JSON verification payload from Render
                const response = await fetch(SIGNAL_URL + "?t=" + new Date().getTime());
                const data = await response.json();

                // Check server signature engine integrity
                if (data && data.signature === "HIZSTAR_ENGINE_FRESH_START") {
                    
                    if (!appLoaded) {
                        appLoaded = true;
                        clearInterval(fakeLoader);
                        statusText.innerText = "workspace open 100%";
                        
                        // Clean up path variations if running out of a GitHub project subdirectory container
                        let cleanRoute = sharedPath;
                        if (cleanRoute.startsWith('/Katale-')) {
                            cleanRoute = cleanRoute.replace('/Katale-', '');
                        }

                        // Combine path logic seamlessly to redirect the iframe to the shared store profile
                        if (cleanRoute.includes('/user/')) {
                            frame.src = BASE_URL + cleanRoute + sharedQuery;
                        } else {
                            frame.src = BASE_URL + (sharedQuery || "/");
                        }

                        frame.onload = function() {
                            setTimeout(() => {
                                frame.style.display = "block";
                                loader.style.opacity = '0';
                                setTimeout(() => { loader.style.display = 'none'; }, 0.4s);
                            }, 300);
                        };
                    }
                } else {
                    throw new Error("Invalid Engine Signature");
                }

            } catch (err) {
                console.log("Signal Dropped. Safe Mode Engaged.");
                
                // Keep the protective cover active if server connection drops or is booting
                appLoaded = false;
                frame.style.display = "none";
                loader.style.display = "flex";
                loader.style.opacity = "1";
                
                progress = 95;
                statusText.innerText = "waking up digital storefront (please wait)... 95%";
            }

            // Keep tracking background signal pulses every 4.5 seconds
            setTimeout(listenToSignal, 4500);
        }

        // Run Engine Monitoring
        listenToSignal();
    </script>
</body>
</html>
