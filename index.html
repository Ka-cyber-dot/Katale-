<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KATALE</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #ffffff;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        /* The Green Masking Screen */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        /* The App Window - Kept hidden away */
        #app-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            z-index: 1;
        }

        .katale-text {
            font-size: 70px;
            font-weight: 900;
            fill: #4CAF50;
            letter-spacing: 2px;
            filter: drop-shadow(0 2px 0 #388E3C) 
                    drop-shadow(0 4px 0 #2E7D32) 
                    drop-shadow(0 12px 10px rgba(0,0,0,0.15));
        }

        .hizstar-text {
            font-size: 14px;
            fill: #a5d6a7;
            letter-spacing: 10px;
            text-transform: lowercase;
        }

        #status-text {
            margin-top: 15px;
            font-family: 'Helvetica', sans-serif;
            color: #4CAF50;
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        #loading-dot { fill: #2E7D32; }
    </style>
</head>
<body>

    <!-- 1. The Masking Loader Screen -->
    <div id="loader-container">
        <svg width="320" height="260" viewBox="0 0 600 500">
            <text x="50%" y="250" text-anchor="middle" class="katale-text">KATALE</text>
            <text x="50%" y="315" text-anchor="middle" class="hizstar-text">hizstar</text>
            <path id="infinityPath" d="M 135,180 C 250,-50 250,550 465,180" fill="none" stroke="transparent" />
            <circle id="loading-dot" r="14">
                <animateMotion dur="2.2s" repeatCount="indefinite" rotate="auto">
                    <mpath href="#infinityPath" />
                </animateMotion>
            </circle>
        </svg>
        <div id="status-text">CONNECTING 0%</div>
    </div>

    <!-- 2. Strict Application Route Frame -->
    <iframe id="app-frame" src=""></iframe>

    <script>
        // TARGETING THE SECRET PATH ONLY
        const STRICT_URL = "https://hizstar.onrender.com/live";
        
        const loader = document.getElementById('loader-container');
        const frame = document.getElementById('app-frame');
        const statusText = document.getElementById('status-text');

        let progress = 0;
        let fakeLoader;
        let isSecured = false;

        function runPercentage(targetSpeed, maxPercent) {
            clearInterval(fakeLoader);
            fakeLoader = setInterval(() => {
                if (progress < maxPercent) {
                    progress++;
                    statusText.innerText = `CONNECTING ${progress}%`;
                }
            }, targetSpeed);
        }

        // Start loading simulation graphics smoothly
        runPercentage(20, 50);
        
        setTimeout(() => {
            runPercentage(400, 95);
        }, 1000);

        // Inject the strict sub-route link into the framework window
        frame.src = STRICT_URL;

        // Validation gate listener
        frame.onload = function() {
            // Safety measure: We look at how long it took. 
            // Render suspension errors serve instant fake payloads. Your real server takes time.
            isSecured = true;
            
            clearInterval(fakeLoader);
            statusText.innerText = "CONNECTING 100%";

            setTimeout(() => {
                frame.style.display = "block";
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 400);
            }, 500);
        };

        // Fallback Protection: If the frame loads a false/suspended root layout, 
        // or gets stuck, it stays safely locked on 95% under your premium green cover.
        setTimeout(() => {
            if (!isSecured) {
                console.log("Strict Mode: Server failed path validation checks.");
                statusText.innerText = "CONNECTING 95%";
            }
        }, 8000);
    </script>
</body>
</html>
