<!DOCTYPE html>
<html>
<head>
    <title>Generating Receipt...</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #eee; }
        #receipt { background: white; padding: 20px; width: 350px; border-radius: 10px; }
        .item-row { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 5px 0; }
        .total-box { background: #2ecc71; color: white; padding: 10px; margin-top: 15px; text-align: right; font-weight: bold; }
    </style>
</head>
<body>
    <div id="receipt">
        <div style="text-align:center; border-bottom: 3px solid #2ecc71; padding-bottom:10px;">
            <h2 style="margin:0;">KATALE STORE</h2>
            <p id="r-date" style="font-size:12px; color:gray;"></p>
        </div>
        <p><b>Customer:</b> <span id="r-customer"></span></p>
        <div id="r-items"></div>
        <div class="total-box">GRAND TOTAL: <span id="r-total"></span></div>
    </div>
    <p>Processing Image... Please wait.</p>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('r-customer').innerText = urlParams.get('customer');
        document.getElementById('r-total').innerText = "$" + urlParams.get('total');
        document.getElementById('r-date').innerText = urlParams.get('date');

        const items = urlParams.get('items').split(';');
        items.forEach(i => {
            const [name, qty, price] = i.split('|');
            document.getElementById('r-items').innerHTML += `
                <div class="item-row">
                    <span>${name} (x${qty})</span>
                    <span>$${price}</span>
                </div>`;
        });

        // Trigger Share once loaded
        window.onload = async () => {
            const canvas = await html2canvas(document.getElementById('receipt'), { scale: 3 });
            const blob = await (await fetch(canvas.toDataURL())).blob();
            const file = new File([blob], 'Receipt.png', { type: 'image/png' });

            if (navigator.share) {
                await navigator.share({ files: [file], title: 'Receipt' });
                window.close(); // Close the browser tab after sharing
            }
        };
    </script>
</body>
</html>
