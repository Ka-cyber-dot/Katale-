<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generating Katale Receipt...</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root { --katale-green: #2ecc71; --dark-bg: #111b21; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        #receipt-canvas { 
            background: white; 
            width: 380px; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header { text-align: center; border-bottom: 4px solid var(--katale-green); padding-bottom: 15px; margin-bottom: 20px; }
        .logo { max-height: 70px; margin-bottom: 10px; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2)); }
        .brand-name { font-size: 26px; font-weight: 900; color: #111; letter-spacing: 1px; margin: 0; }
        
        .info-row { display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-bottom: 15px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 11px; color: var(--katale-green); text-transform: uppercase; padding-bottom: 8px; border-bottom: 1px solid #eee; }
        td { padding: 10px 0; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
        
        .total-banner { 
            margin-top: 20px; 
            background: var(--katale-green); 
            color: white; 
            padding: 15px; 
            border-radius: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="receipt-canvas">
        <div class="header">
            <img id="r-logo" class="logo" src="">
            <h1 class="brand-name">KATALE</h1>
            <div style="font-size: 10px; color: var(--katale-green); font-weight: bold;">PREMIUM SALES RECORD</div>
        </div>

        <div class="info-row">
            <span><b>User:</b> <span id="r-cust"></span></span>
            <span><b>Date:</b> <span id="r-date"></span></span>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Description</th>
                    <th style="text-align:center">Qty</th>
                    <th style="text-align:right">Amount</th>
                </tr>
            </thead>
            <tbody id="r-items"></tbody>
        </table>

        <div class="total-banner">
            <span style="font-size: 14px;">TOTAL PAID</span>
            <span id="r-total" style="font-size: 22px; font-weight: 900;"></span>
        </div>

        <div style="text-align:center; margin-top:20px; font-size:10px; color:#aaa; border-top:1px dashed #eee; padding-top:10px;">
            Thank you for using Katale. 💚
        </div>
    </div>

    <p id="status-msg" style="margin-top:20px; color:#666;">Creating high-quality image...</p>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        // Setup Data
        document.getElementById('r-cust').innerText = urlParams.get('customer');
        document.getElementById('r-date').innerText = urlParams.get('date');
        document.getElementById('r-total').innerText = "$" + urlParams.get('total');
        
        // Handle Logo (Fall back to a placeholder if none provided)
        const logoUrl = urlParams.get('logo');
        document.getElementById('r-logo').src = logoUrl || "https://ka-cyber-dot.github.io/Katale-/logo.png";

        // Decode and Compile Items
        try {
            const rawItems = atob(urlParams.get('items')); // Decode B64
            const itemsArray = rawItems.split(';');
            itemsArray.forEach(item => {
                const [name, qty, price] = item.split('|');
                document.getElementById('r-items').innerHTML += `
                    <tr>
                        <td>${name}</td>
                        <td style="text-align:center">${qty}</td>
                        <td style="text-align:right; font-weight:bold;">$${price}</td>
                    </tr>`;
            });
        } catch(e) { console.error("Item decode failed"); }

        // Execute Sharing
        window.onload = async () => {
            try {
                const canvas = await html2canvas(document.getElementById('receipt-canvas'), {
                    scale: 3,
                    useCORS: true,
                    backgroundColor: "#ffffff"
                });

                const blob = await (await fetch(canvas.toDataURL("image/png"))).blob();
                const file = new File([blob], 'Katale_Receipt.png', { type: 'image/png' });

                if (navigator.share) {
                    await navigator.share({
                        files: [file],
                        title: 'Katale Receipt',
                        text: 'Your official digital receipt is ready.'
                    });
                    document.getElementById('status-msg').innerText = "✅ Success! You can close this tab.";
                }
            } catch (err) {
                document.getElementById('status-msg').innerText = "❌ Sharing error. Try a screenshot.";
            }
        };
    </script>
</body>
            </html>
